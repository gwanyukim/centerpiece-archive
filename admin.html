<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Centerpiece Archive Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="admin-page">
      <header class="admin-header">
        <h1>Centerpiece Archive Manager</h1>
        <p>관리자 로그인 후, 순서대로 입력해서 저장하세요.</p>
        <a class="manage-link" href="./index.html">Back To Gallery</a>
      </header>

      <section class="admin-panel admin-auth" id="auth-panel">
        <h2>Admin Login</h2>
        <p class="step-help">등록한 관리자 이메일로 로그인 링크를 받습니다.</p>
        <div class="admin-actions">
          <input id="login-email" type="email" placeholder="admin@email.com" />
          <button id="send-login-link" class="admin-button admin-button-strong" type="button">Send Login Link</button>
          <button id="logout" class="admin-button" type="button">Logout</button>
        </div>
        <p id="auth-status" class="admin-status"></p>
      </section>

      <section class="admin-guide admin-panel">
        <h2>Quick Guide</h2>
        <ol class="guide-steps">
          <li>기본 정보 입력</li>
          <li>대표 사진 업로드</li>
          <li>상세 사진 + 설명 입력 후 저장</li>
        </ol>
      </section>

      <section class="admin-panel" id="editor-panel">
        <h2>Upload Item</h2>
        <form id="item-form" class="admin-form admin-form-simple">
          <input id="field-id" name="id" type="hidden" />

          <section class="form-step">
            <h3>1. 기본 정보</h3>
            <label>
              Brand
              <input id="field-brand" name="brand" type="text" required />
            </label>
            <label>
              Product Name
              <input id="field-name" name="name" type="text" required />
            </label>
            <label>
              Era
              <input id="field-era" name="era" type="text" required />
            </label>
            <label>
              Main Description
              <textarea id="field-description" name="description" rows="5" required></textarea>
            </label>
          </section>

          <section class="form-step">
            <h3>2. 대표 사진</h3>
            <label>
              사진 업로드 (권장)
              <input id="field-cover-file" name="coverFile" type="file" accept="image/*" />
            </label>
            <label>
              또는 이미지 URL/경로
              <input id="field-cover-src" name="coverSrc" type="text" required />
            </label>
            <label>
              대표 사진 메모 (선택)
              <input id="field-cover-note" name="coverNote" type="text" />
            </label>
            <div class="upload-preview-wrap">
              <p>미리보기</p>
              <img id="cover-preview" class="upload-preview" alt="대표 사진 미리보기" />
            </div>
          </section>

          <section class="form-step">
            <h3>3. 상세 사진</h3>
            <div id="detail-rows" class="detail-rows"></div>
            <button id="add-detail-row" class="admin-button" type="button">+ 상세 사진 추가</button>
          </section>

          <div class="admin-actions">
            <button class="admin-button admin-button-strong" type="submit">저장하기</button>
            <button id="new-item" class="admin-button" type="button">새로 작성</button>
          </div>
        </form>
      </section>

      <section class="admin-panel" id="saved-panel">
        <h2>Saved Items</h2>
        <ul id="item-list" class="item-list"></ul>
      </section>

      <p id="admin-status" class="admin-status" aria-live="polite"></p>
    </main>

    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="./data.js"></script>
    <script defer src="./admin.js"></script>
  </body>
</html>

<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Centerpiece Archive Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="admin-page">
      <header class="admin-header">
        <h1>Centerpiece Archive Manager</h1>
        <p>관리자 로그인 후, 순서대로 입력해서 저장하세요.</p>
        <a class="manage-link" href="./index.html">Back To Gallery</a>
      </header>

      <section class="admin-panel admin-auth" id="auth-panel">
        <h2>Admin Login</h2>
        <p class="step-help">등록한 관리자 이메일로 로그인 링크를 받습니다.</p>
        <div class="admin-actions">
          <input id="login-email" type="email" placeholder="admin@email.com" />
          <button id="send-login-link" class="admin-button admin-button-strong" type="button" onclick="quickSendMagicLink(); return false;">Send Login Link</button>
          <button id="logout" class="admin-button" type="button">Logout</button>
        </div>
        <p id="auth-status" class="admin-status">초기 상태: 페이지 로딩 중...</p>
      </section>

      <section class="admin-guide admin-panel">
        <h2>Quick Guide</h2>
        <ol class="guide-steps">
          <li>기본 정보 입력</li>
          <li>대표 사진 업로드</li>
          <li>상세 사진 + 설명 입력 후 저장</li>
        </ol>
      </section>

      <section class="admin-panel" id="editor-panel">
        <h2>Upload Item</h2>
        <form id="item-form" class="admin-form admin-form-simple">
          <input id="field-id" name="id" type="hidden" />

          <section class="form-step">
            <h3>1. 기본 정보</h3>
            <label>
              Brand
              <input id="field-brand" name="brand" type="text" required />
            </label>
            <label>
              Product Name
              <input id="field-name" name="name" type="text" required />
            </label>
            <label>
              Era
              <input id="field-era" name="era" type="text" required />
            </label>
            <label>
              Main Description
              <textarea id="field-description" name="description" rows="5" required></textarea>
            </label>
          </section>

          <section class="form-step">
            <h3>2. 대표 사진</h3>
            <label>
              사진 업로드 (권장)
              <input id="field-cover-file" name="coverFile" type="file" accept="image/*" />
            </label>
            <label>
              또는 이미지 URL/경로
              <input id="field-cover-src" name="coverSrc" type="text" required />
            </label>
            <label>
              대표 사진 메모 (선택)
              <input id="field-cover-note" name="coverNote" type="text" />
            </label>
            <div class="upload-preview-wrap">
              <p>미리보기</p>
              <img id="cover-preview" class="upload-preview" alt="대표 사진 미리보기" />
            </div>
          </section>

          <section class="form-step">
            <h3>3. 상세 사진</h3>
            <div id="detail-rows" class="detail-rows"></div>
            <button id="add-detail-row" class="admin-button" type="button">+ 상세 사진 추가</button>
          </section>

          <div class="admin-actions">
            <button class="admin-button admin-button-strong" type="submit">저장하기</button>
            <button id="new-item" class="admin-button" type="button">새로 작성</button>
          </div>
        </form>
      </section>

      <section class="admin-panel" id="saved-panel">
        <h2>Saved Items</h2>
        <ul id="item-list" class="item-list"></ul>
      </section>

      <p id="admin-status" class="admin-status" aria-live="polite"></p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      if (!window.supabase) {
        const fallback = document.createElement('script');
        fallback.src = 'https://unpkg.com/@supabase/supabase-js@2';
        document.head.appendChild(fallback);
      }
    </script>
    <script src="./data.js"></script>
    <script>
      async function quickSendMagicLink() {
        const status = document.getElementById('auth-status');
        const emailInput = document.getElementById('login-email');
        const email = (emailInput?.value || '').trim();

        if (!email) {
          status.textContent = '이메일을 입력하세요.';
          return;
        }

        status.textContent = '로그인 링크 발송 중...';

        try {
          const response = await fetch(
            'https://ivoieipceangpinnedpd.supabase.co/auth/v1/otp',
            {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                apikey: 'sb_publishable_373hD2fL47vgruAWe4oL2A_MICSBB-B'
              },
              body: JSON.stringify({
                email,
                create_user: false,
                email_redirect_to:
                  'https://gwanyukim.github.io/centerpiece-archive/admin.html'
              })
            }
          );

          const payload = await response.json().catch(() => ({}));
          if (!response.ok) {
            status.textContent = `로그인 링크 발송 실패: ${payload.msg || payload.error_description || response.status}`;
            return;
          }

          status.textContent = '이메일로 로그인 링크를 보냈습니다. 메일함/스팸함을 확인하세요.';
        } catch (error) {
          status.textContent = `로그인 요청 오류: ${error.message || '네트워크 오류'}`;
        }
      }
    </script>
    <script>
      window.addEventListener('error', (event) => {
        const el = document.getElementById('auth-status');
        if (el) {
          el.textContent = `스크립트 오류: ${event.message}`;
        }
      });

      const supabase =
        typeof createSupabaseClient === 'function' ? createSupabaseClient() : null;
      const authStatusEl = document.getElementById('auth-status');
      const statusEl = document.getElementById('admin-status');
      const listEl = document.getElementById('item-list');
      const rowsEl = document.getElementById('detail-rows');
      const coverPreview = document.getElementById('cover-preview');
      const editorPanel = document.getElementById('editor-panel');
      const savedPanel = document.getElementById('saved-panel');
      const form = document.getElementById('item-form');

      const fields = {
        id: document.getElementById('field-id'),
        brand: document.getElementById('field-brand'),
        name: document.getElementById('field-name'),
        era: document.getElementById('field-era'),
        description: document.getElementById('field-description'),
        coverSrc: document.getElementById('field-cover-src'),
        coverFile: document.getElementById('field-cover-file'),
        coverNote: document.getElementById('field-cover-note')
      };

      const state = {
        items: [],
        editingId: null,
        session: null
      };

      function setStatus(message) {
        statusEl.textContent = message;
      }

      function setAuthStatus(message) {
        authStatusEl.textContent = message;
      }

      function slugify(text) {
        return String(text || '')
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, '-')
          .replace(/^-+|-+$/g, '');
      }

      function setImagePreview(imgEl, src) {
        if (!src) {
          imgEl.removeAttribute('src');
          imgEl.classList.add('is-empty');
          return;
        }
        imgEl.src = src;
        imgEl.classList.remove('is-empty');
      }

      function rowToDetailImage(row) {
        return {
          src: row.querySelector('.detail-src').value.trim(),
          note: row.querySelector('.detail-note').value.trim()
        };
      }

      async function uploadFile(file, prefix = 'image') {
        const ext = file.name.includes('.') ? file.name.split('.').pop() : 'jpg';
        const path = `${prefix}/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;

        const { error } = await supabase.storage
          .from(SUPABASE_IMAGE_BUCKET)
          .upload(path, file, { upsert: false });

        if (error) {
          throw error;
        }

        const { data } = supabase.storage.from(SUPABASE_IMAGE_BUCKET).getPublicUrl(path);
        return data.publicUrl;
      }

      function makeDetailRow(detail = { src: '', note: '' }) {
        const row = document.createElement('div');
        row.className = 'detail-row';
        row.innerHTML = `
          <div class="detail-row-grid">
            <label>
              상세 사진 업로드
              <input class="detail-file" type="file" accept="image/*" />
            </label>
            <label>
              또는 URL/경로
              <input class="detail-src" type="text" />
            </label>
            <label>
              이 사진 설명
              <textarea class="detail-note" rows="3"></textarea>
            </label>
            <button class="admin-button detail-remove" type="button">제거</button>
          </div>
          <img class="detail-preview upload-preview" alt="상세 사진 미리보기" />
        `;

        const srcInput = row.querySelector('.detail-src');
        const fileInput = row.querySelector('.detail-file');
        const noteInput = row.querySelector('.detail-note');
        const preview = row.querySelector('.detail-preview');

        srcInput.value = detail.src || '';
        noteInput.value = detail.note || '';
        setImagePreview(preview, detail.src || '');

        srcInput.addEventListener('input', () => {
          setImagePreview(preview, srcInput.value.trim());
        });

        fileInput.addEventListener('change', async () => {
          if (!fileInput.files[0]) return;
          try {
            const publicUrl = await uploadFile(fileInput.files[0], 'detail');
            srcInput.value = publicUrl;
            setImagePreview(preview, publicUrl);
            setStatus('상세 사진 업로드 완료');
          } catch (_) {
            setStatus('상세 사진 업로드 실패');
          }
        });

        row.querySelector('.detail-remove').addEventListener('click', () => {
          row.remove();
        });

        rowsEl.appendChild(row);
      }

      function resetForm() {
        form.reset();
        rowsEl.innerHTML = '';
        makeDetailRow();
        setImagePreview(coverPreview, '');
        fields.id.value = '';
        state.editingId = null;
      }

      function fillForm(item) {
        fields.id.value = item.id;
        fields.brand.value = item.brand;
        fields.name.value = item.name;
        fields.era.value = item.era;
        fields.description.value = item.description;
        fields.coverSrc.value = item.coverImage.src;
        fields.coverNote.value = item.coverImage.note || '';
        fields.coverFile.value = '';
        setImagePreview(coverPreview, item.coverImage.src || '');

        rowsEl.innerHTML = '';
        if (!item.detailImages.length) {
          makeDetailRow();
        } else {
          item.detailImages.forEach((detail) => makeDetailRow(detail));
        }

        state.editingId = item.id;
      }

      async function loadItems() {
        const { data, error } = await supabase
          .from('archive_items')
          .select('id,brand,name,era,description,cover_src,cover_note,detail_images,created_at')
          .order('created_at', { ascending: false });

        if (error) {
          throw error;
        }

        state.items = data
          .map((row) =>
            normalizeItem({
              id: row.id,
              brand: row.brand,
              name: row.name,
              era: row.era,
              description: row.description,
              coverImage: {
                src: row.cover_src,
                note: row.cover_note || ''
              },
              detailImages: Array.isArray(row.detail_images) ? row.detail_images : []
            })
          )
          .filter(Boolean);
      }

      function renderList() {
        listEl.innerHTML = '';

        if (!state.items.length) {
          listEl.innerHTML = '<li class="item-empty">아직 저장된 아이템이 없습니다.</li>';
          return;
        }

        state.items.forEach((item) => {
          const li = document.createElement('li');
          li.className = 'item-entry';
          li.innerHTML = `
            <img class="item-thumb" src="${item.coverImage.src}" alt="${item.brand} ${item.name}" />
            <div class="item-summary">
              <p>${item.brand}</p>
              <h3>${item.name}</h3>
              <small>${item.era}</small>
            </div>
            <div class="item-buttons">
              <button class="admin-button" data-action="edit" data-id="${item.id}" type="button">수정</button>
              <button class="admin-button" data-action="delete" data-id="${item.id}" type="button">삭제</button>
            </div>
          `;
          listEl.appendChild(li);
        });
      }

      async function saveItem(event) {
        event.preventDefault();

        const brand = fields.brand.value.trim();
        const name = fields.name.value.trim();
        const era = fields.era.value.trim();
        const description = fields.description.value.trim();
        const coverNote = fields.coverNote.value.trim();
        let id = fields.id.value.trim();

        if (!id) {
          id = `${slugify(brand)}-${slugify(name)}-${slugify(era)}`;
          fields.id.value = id;
        }

        let coverSrc = fields.coverSrc.value.trim();
        if (fields.coverFile.files[0]) {
          coverSrc = await uploadFile(fields.coverFile.files[0], 'cover');
          fields.coverSrc.value = coverSrc;
          setImagePreview(coverPreview, coverSrc);
        }

        if (!id || !brand || !name || !description || !coverSrc) {
          setStatus('필수값: 브랜드, 제품명, 설명, 대표사진');
          return;
        }

        const detailImages = Array.from(rowsEl.querySelectorAll('.detail-row'))
          .map(rowToDetailImage)
          .filter((entry) => entry.src);

        const payload = {
          id,
          brand,
          name,
          era,
          description,
          cover_src: coverSrc,
          cover_note: coverNote,
          detail_images: detailImages
        };

        const { error } = await supabase.from('archive_items').upsert(payload);
        if (error) {
          throw error;
        }

        await loadItems();
        renderList();
        const saved = state.items.find((entry) => entry.id === id);
        if (saved) {
          fillForm(saved);
        }
        setStatus('저장 완료');
      }

      async function deleteItem(id) {
        const { error } = await supabase.from('archive_items').delete().eq('id', id);
        if (error) {
          throw error;
        }

        await loadItems();
        renderList();
        if (state.editingId === id) {
          resetForm();
        }
        setStatus('삭제 완료');
      }

      setAuthStatus('스크립트 로드 완료. 이메일 입력 후 로그인 링크를 보내세요.');

      async function refreshUIBySession() {
        if (!supabase) {
          editorPanel.style.display = 'none';
          savedPanel.style.display = 'none';
          setAuthStatus(
            'Supabase 스크립트 로딩 실패: 브라우저 추적차단/확장프로그램을 끄고 새로고침하세요.'
          );
          return;
        }

        const {
          data: { session }
        } = await supabase.auth.getSession();

        state.session = session;
        const loggedIn = Boolean(session);

        editorPanel.style.display = loggedIn ? '' : 'none';
        savedPanel.style.display = loggedIn ? '' : 'none';

        if (!loggedIn) {
          setAuthStatus('로그인이 필요합니다.');
          return;
        }

        setAuthStatus(`로그인됨: ${session.user.email}`);
        await loadItems();
        renderList();
        resetForm();
      }

      document.getElementById('send-login-link').addEventListener('click', async () => {
        if (!supabase) {
          setAuthStatus('Supabase 연결 실패: 새로고침 후 다시 시도하세요.');
          return;
        }

        const email = document.getElementById('login-email').value.trim();
        if (!email) {
          setAuthStatus('이메일을 입력하세요.');
          return;
        }

        setAuthStatus('로그인 링크 발송 중...');

        try {
          const { error } = await supabase.auth.signInWithOtp({
            email,
            options: {
              emailRedirectTo: window.location.href
            }
          });

          if (error) {
            setAuthStatus(`로그인 링크 발송 실패: ${error.message}`);
            return;
          }

          setAuthStatus('이메일로 로그인 링크를 보냈습니다. 메일함/스팸함을 확인하세요.');
        } catch (error) {
          setAuthStatus(`로그인 요청 오류: ${error.message || '알 수 없는 오류'}`);
        }
      });

      document.getElementById('logout').addEventListener('click', async () => {
        if (!supabase) return;
        await supabase.auth.signOut();
        await refreshUIBySession();
      });

      fields.coverSrc.addEventListener('input', () => {
        setImagePreview(coverPreview, fields.coverSrc.value.trim());
      });

      fields.coverFile.addEventListener('change', async () => {
        if (!fields.coverFile.files[0]) return;
        try {
          const publicUrl = await uploadFile(fields.coverFile.files[0], 'cover');
          fields.coverSrc.value = publicUrl;
          setImagePreview(coverPreview, publicUrl);
          setStatus('대표 사진 업로드 완료');
        } catch (_) {
          setStatus('대표 사진 업로드 실패');
        }
      });

      form.addEventListener('submit', (event) => {
        saveItem(event).catch((error) => {
          setStatus(`저장 실패: ${error.message || '오류'}`);
        });
      });

      document.getElementById('add-detail-row').addEventListener('click', () => {
        makeDetailRow();
      });

      document.getElementById('new-item').addEventListener('click', () => {
        resetForm();
      });

      listEl.addEventListener('click', (event) => {
        const button = event.target;
        if (!(button instanceof HTMLButtonElement)) return;

        const action = button.dataset.action;
        const id = button.dataset.id;
        const item = state.items.find((entry) => entry.id === id);
        if (!item) return;

        if (action === 'edit') {
          fillForm(item);
          setStatus('수정 모드');
          return;
        }

        if (action === 'delete') {
          if (!window.confirm('삭제할까요?')) return;
          deleteItem(id).catch((error) => {
            setStatus(`삭제 실패: ${error.message || '오류'}`);
          });
        }
      });

      if (supabase) {
        supabase.auth.onAuthStateChange(() => {
          refreshUIBySession().catch((error) => {
            setAuthStatus(`세션 확인 실패: ${error.message || '오류'}`);
          });
        });
      }

      refreshUIBySession().catch((error) => {
        setAuthStatus(`초기 로딩 실패: ${error.message || '오류'}`);
      });
    </script>
  </body>
</html>
